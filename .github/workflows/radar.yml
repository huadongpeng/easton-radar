name: Easton Radar

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "40 21,2,8 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: easton-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Restore radar archive
        run: |
          set -euo pipefail
          mkdir -p data reports
          if git ls-remote --exit-code --heads origin radar-archive >/dev/null 2>&1; then
            echo "[info] Restoring reports and topic archive from radar-archive branch"
            git fetch origin radar-archive
            if git cat-file -e origin/radar-archive:data/topic_archive.json 2>/dev/null; then
              git show origin/radar-archive:data/topic_archive.json > data/topic_archive.json
            fi
            while IFS= read -r path; do
              mkdir -p "$(dirname "$path")"
              git show "origin/radar-archive:$path" > "$path"
            done < <(git ls-tree -r --name-only origin/radar-archive reports | grep '\.json$' || true)
          else
            echo "[info] radar-archive branch not found; starting with empty archive"
          fi
      - name: Run radar pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TAVILY_SEARCH_DEPTH: ${{ vars.TAVILY_SEARCH_DEPTH || 'basic' }}
          TAVILY_INCLUDE_RAW_CONTENT: ${{ vars.TAVILY_INCLUDE_RAW_CONTENT || 'false' }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TOPHUBDATA_ACCESS_KEY: ${{ secrets.TOPHUBDATA_ACCESS_KEY }}
          TOPHUBDATA_ENABLE_PAID_DETAIL: ${{ vars.TOPHUBDATA_ENABLE_PAID_DETAIL }}
          TOPHUBDATA_PAID_DETAIL_LIMIT_PER_RUN: ${{ vars.TOPHUBDATA_PAID_DETAIL_LIMIT_PER_RUN || '8' }}
          SEARCH_API_CALL_LIMIT_PER_RUN: ${{ vars.SEARCH_API_CALL_LIMIT_PER_RUN || '60' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/radar.py --slot auto
      - name: Persist radar archive
        run: |
          set -euo pipefail
          archive_dir="../radar-archive-worktree"
          if git ls-remote --exit-code --heads origin radar-archive >/dev/null 2>&1; then
            git fetch origin radar-archive
            git worktree add --detach "$archive_dir" origin/radar-archive
          else
            git worktree add --detach "$archive_dir"
            (
              cd "$archive_dir"
              git checkout --orphan radar-archive
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi
          mkdir -p "$archive_dir/data" "$archive_dir/reports"
          rm -f "$archive_dir/data/topic_archive.json" "$archive_dir"/reports/*.json
          cp data/topic_archive.json "$archive_dir/data/topic_archive.json"
          cp reports/*.json "$archive_dir/reports/" 2>/dev/null || true
          {
            echo "# Easton Radar Archive"
            echo
            echo "This branch stores generated radar report JSON files and topic fingerprints."
            echo "The main branch stays code-only; GitHub Pages is rebuilt from this archive plus the latest run."
          } > "$archive_dir/README.md"
          (
            cd "$archive_dir"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f README.md data/topic_archive.json reports
            git diff --cached --quiet || git commit -m "chore: update radar archive [skip ci]"
            git push origin HEAD:radar-archive
          )
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
